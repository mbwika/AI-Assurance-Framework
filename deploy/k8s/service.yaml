apiVersion: v1
kind: Service
metadata:
  name: aiaf-api
  labels:
    app: aiaf
    component: api
spec:
  selector:
    app: aiaf
    component: api
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: Secret
metadata:
  name: aiaf-secrets
type: Opaque
stringData:
  pg-dsn: "postgresql://aiaf:CHANGEME@postgres:5432/aiaf"
  api-key: "CHANGEME"
  attestation-key: ""
  report-signing-key: ""
