name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test-and-package:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff build

      - name: Run tests
        run: |
          python -m pytest -q

      - name: Lint with ruff
        run: |
          ruff check .

      - name: Build source and wheel distributions
        run: |
          python -m build

      - name: Install built wheel and run smoke checks
        run: |
          python -m venv /tmp/aiaf-wheel-venv
          . /tmp/aiaf-wheel-venv/bin/activate
          pip install --upgrade pip
          pip install dist/*.whl
          python -c "import aiaf; assert aiaf.__version__ == '0.2.0'"
          python -c "from aiaf.api import portal; assert portal.build_available()"
          aiaf --help >/dev/null

  frontend-build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build
